name: Install Docs Python Dependencies
description: Installs documentation Python dependencies from pyproject.toml using uv.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup/setup-uv-python
      if: github.event.repository.name == 'template-python'
    - uses: javidahmed64592/template-python/.github/actions/setup/setup-uv-python@main
      if: github.event.repository.name != 'template-python'

    - name: Install dependencies
      run: |
        uv sync --extra docs
      shell: bash
