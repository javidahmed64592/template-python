name: Run CI job - Bandit
description: Run Bandit security checks on the codebase.

runs:
  using: composite
  steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/install-python-dev

      - name: Security check
        run: |
          uv run bandit -r ${{ env.PACKAGE_NAME }} -f json -o bandit-report.json || true
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
