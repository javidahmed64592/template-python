name: Build Documentation with Sphinx
description: Builds documentation using Sphinx and uploads it as an artifact.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup/install-python-docs
      if: github.event.repository.name == 'template-python'
    - uses: javidahmed64592/template-python/.github/actions/setup/install-python-docs@main
      if: github.event.repository.name != 'template-python'

    - name: Build docs
      run: |
        uv run sphinx-build -M clean docs/source/ docs/build/
        uv run sphinx-build -M html docs/source/ docs/build/
      shell: bash

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: documentation
        path: docs/build/
