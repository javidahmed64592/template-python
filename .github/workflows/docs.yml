name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docs/build-docs
        if: github.event.repository.name == 'template-python'
      - uses: javidahmed64592/template-python/.github/actions/docs/build-docs@main
        if: github.event.repository.name != 'template-python'

  publish-docs:
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docs/publish-docs
        if: github.event.repository.name == 'template-python'
        id: publish_local
      - uses: javidahmed64592/template-python/.github/actions/docs/publish-docs@main
        if: github.event.repository.name != 'template-python'
        id: publish_remote
      - id: publish
        run: echo "page_url=${{ steps.publish_local.outputs.page_url || steps.publish_remote.outputs.page_url }}" >> $GITHUB_OUTPUT
        shell: bash
